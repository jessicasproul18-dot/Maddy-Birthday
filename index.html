<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Maddy!</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div id="banner-container">
        <div class="banner">
            <h1 id="typewriter"></h1>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="gameOverScreen">
            <h2 style="color: #f50057; margin-top: 0;">Happy Birthday Maddy! 🎂</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <input type="text" id="initialsInput" maxlength="3" placeholder="MDY"><br>
            <button id="saveBtn">Save & Restart</button>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <div id="leaderboardList"></div>
        </div>

        <img id="introCat" src="intro.gif">
        <img id="gameCat" src="run.gif">

        <canvas id="gameCanvas"></canvas>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button id="startButton" style="display: none;">Start Game!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
